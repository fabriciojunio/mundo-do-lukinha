<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#2eb8b0"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Sol central -->
  <circle cx="256" cy="220" r="90" fill="url(#sun)"/>

  <!-- Raios do sol -->
  <g fill="#FFD93D" opacity="0.85">
    <rect x="248" y="88" width="16" height="48" rx="8"/>
    <rect x="248" y="296" width="16" height="48" rx="8"/>
    <rect x="88" y="212" width="48" height="16" rx="8"/>
    <rect x="296" y="212" width="48" height="16" rx="8"/>
    <!-- diagonais -->
    <rect x="145" y="121" width="16" height="48" rx="8" transform="rotate(45 153 145)"/>
    <rect x="337" y="121" width="16" height="48" rx="8" transform="rotate(-45 353 145)"/>
    <rect x="145" y="295" width="16" height="48" rx="8" transform="rotate(-45 153 319)"/>
    <rect x="337" y="295" width="16" height="48" rx="8" transform="rotate(45 353 319)"/>
  </g>

  <!-- Estrelinhas decorativas -->
  <circle cx="130" cy="130" r="10" fill="#4ECDC4" opacity="0.8"/>
  <circle cx="382" cy="110" r="7" fill="#FF9500" opacity="0.8"/>
  <circle cx="400" cy="350" r="9" fill="#4ECDC4" opacity="0.7"/>
  <circle cx="110" cy="370" r="6" fill="#FFD93D" opacity="0.8"/>

  <!-- Barra teal embaixo (como controle de jogo) -->
  <rect x="96" y="350" width="320" height="96" rx="28" fill="url(#teal)"/>

  <!-- Botões do controle -->
  <circle cx="196" cy="398" r="18" fill="white" opacity="0.9"/>
  <circle cx="256" cy="398" r="18" fill="white" opacity="0.9"/>
  <circle cx="316" cy="398" r="18" fill="white" opacity="0.9"/>

  <!-- Simbolo de jogo nos botoes -->
  <text x="196" y="406" text-anchor="middle" font-size="20" fill="#4ECDC4" font-family="sans-serif" font-weight="bold">▲</text>
  <text x="256" y="406" text-anchor="middle" font-size="20" fill="#7C3AED" font-family="sans-serif" font-weight="bold">●</text>
  <text x="316" y="406" text-anchor="middle" font-size="20" fill="#FF9500" font-family="sans-serif" font-weight="bold">■</text>
</svg>
